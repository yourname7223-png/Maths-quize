        const questionsPerPage = 10; // Show 10 questions at a time for performance

        function loadQuestion() {
            const question = questions[currentQuestion];
            document.getElementById('question-number').textContent = question.number;
            document.getElementById('question-text').textContent = question.text;
            document.getElementById('answer-feedback').style.display = 'none';

            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';

            question.options.forEach((option, index) => {
                const button = document.createElement('button');
                button.className = 'option-btn';
                button.textContent = option;
                button.dataset.index = index;
                button.addEventListener('click', () => checkAnswer(index));
                optionsContainer.appendChild(button);
            });

            document.getElementById('prev-btn').disabled = currentQuestion === 0;
            document.getElementById('next-btn').disabled = currentQuestion === questions.length - 1;
            document.getElementById('progress').textContent = `प्रश्न ${currentQuestion + 1}/${questions.length}`;
        }

        function checkAnswer(selectedIndex) {
            const question = questions[currentQuestion];
            const options = document.querySelectorAll('.option-btn');
            const feedback = document.getElementById('answer-feedback');

            options.forEach((option, index) => {
                option.disabled = true;
                if (index === selectedIndex && index === question.correct) {
                    option.classList.add('correct');
                    feedback.className = 'answer-feedback correct-feedback';
                    feedback.textContent = `सही उत्तर: विकल्प ${question.correct + 1} - ${question.options[question.correct]}`;
                } else if (index === selectedIndex) {
                    option.classList.add('wrong');
                    options[question.correct].classList.add('correct');
                    feedback.className = 'answer-feedback wrong-feedback';
                    feedback.textContent = `सही उत्तर: विकल्प ${question.correct + 1} - ${question.options[question.correct]}`;
                } else if (index === question.correct) {
                    option.classList.add('correct');
                }
            });

            feedback.style.display = 'block';
        }

        document.getElementById('prev-btn').addEventListener('click', () => {
            if (currentQuestion > 0) {
                currentQuestion--;
                loadQuestion();
            }
        });

        document.getElementById('next-btn').addEventListener('click', () => {
            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                loadQuestion();
            }
        });

        // Initialize
        loadQuestion();
    </script>
</body>
</html>
